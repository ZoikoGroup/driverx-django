name: Auto Deploy to GCP on Merge to Main

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to GCP Instance
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.GCP_SSH_PRIVATE_KEY }}

      - name: Deploy via SSH
        run: |
          ssh -o StrictHostKeyChecking=no \
              -o ConnectTimeout=30 \
              ${{ secrets.GCP_USER }}@${{ secrets.GCP_HOST }} << 'EOF'
                
                echo "🚀 Starting deployment..."

                cd /var/www/html/driverx-django || exit 1

                # Pull latest code
                git pull origin main

                # Activate virtualenv
                source venv/bin/activate

                # Install dependencies
                pip install -r requirements.txt

                # Run migrations
                python manage.py migrate

                # Collect static files
                python manage.py collectstatic --noinput

                # Restart services
                sudo systemctl restart gunicorn
                sudo systemctl restart nginx

                echo "✅ Deployment completed"

          EOF

      - name: Notify success
        if: success()
        run: echo "✅ Deployment to GCP successful!"

      - name: Notify failure
        if: failure()
        run: echo "❌ Deployment failed! Check logs."