name: Auto Deploy to GCP on Merge to Main

on:
  push:
    branches:
      - main  # Triggers when ANY branch is merged into main

jobs:
  deploy:
    name: Deploy to GCP Instance
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.GCP_SSH_PRIVATE_KEY }}

      - name: Add GCP host to known_hosts
        run: |
          ssh-keyscan -H ${{ secrets.GCP_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy via SSH
        run: |
          ssh ${{ secrets.GCP_USER }}@${{ secrets.GCP_HOST }} "bash /var/www/html/driverx-django/deploy.sh"

      - name: Notify success
        if: success()
        run: echo "✅ Deployment to GCP successful!"

      - name: Notify failure
        if: failure()
        run: echo "❌ Deployment failed! Check logs."